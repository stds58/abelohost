repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [ --no-fix ]
        exclude: ^frontend/
      - id: ruff-format
        exclude: ^frontend/

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: uv run pylint --fail-under=9.0 --ignore=env.py --ignore-patterns='alembic/versions/*'
        language: system
        types: [python]
        exclude: ^(?:backend/alembic/.*|env\.py|frontend/.*|scripts/.*)$

  - repo: local
    hooks:
      - id: docker-compose-check
        name: Validate docker-compose.yml
        entry: docker compose config
        language: system
        files: docker-compose.*\.yml$
        pass_filenames: false
        always_run: true

