services:
  load-test:
    container_name: load-test
    profiles:
      - load-test
    image: williamyeh/wrk
    command: ["-t", "6", "-c", "96", "-d", "600s", "--latency", "http://abelo-app:8000/v1/message/069dbb7d-9295-7f35-8000-5734372176aa"]
    volumes:
      - ./wrk_lua/post.lua:/scripts/post.lua:ro
    depends_on:
      abelo-app:
        condition: service_started
    network_mode: service:abelo-app
