services:
  load-test:
    container_name: load-test
    profiles:
      - load-test
    image: williamyeh/wrk
    command: [ "-t", "6", "-c", "96", "-d", "60s", "--latency", "http://abelo-app:8000/message/069d6cb6-56ab-7ff8-8000-5e30722611f1" ]
    depends_on:
      abelo-app:
        condition: service_started
    network_mode: service:abelo-app
