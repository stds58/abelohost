x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add: []
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
    - /run:size=32m,mode=755
  ulimits:
    nproc: 512
    nofile:
      soft: 4096
      hard: 8192

services:
  kafka:
    container_name: abelo-kafka
    image: apache/kafka:3.9.0
    <<: *security-defaults
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
#    ports:
#      - "9092:9092"
    environment:
      # --- KRaft Settings ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # --- Listeners ---
      # PLAINTEXT: для внутренних соединений (между контейнерами)
      # EXTERNAL: для доступа с хост-машины (если нужно)
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Анонсируем клиентам конкретное имя сервиса в сети Docker
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      # --- Security & Protocol ---
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      # --- Storage & Topics ---
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      # --- Performance/Tuning for Dev ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_BATCH_SIZE: 16384 # Увеличиваем размер пакета, который Kafka пытается отправить за раз.
      KAFKA_LINGER_MS: 5 # Сколько времени ждать, чтобы набрать batch_size.

      # --- Logs & Retention (для тестов можно уменьшить) ---
#      KAFKA_LOG_RETENTION_HOURS: 168 #
#      KAFKA_LOG_SEGMENT_BYTES: 1073741824  #
#      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000  #
    volumes:
      - kafka-data:/var/lib/kafka/data
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /opt/kafka/config:size=64m,mode=1777
      - /opt/kafka/logs:size=64m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - abelo_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  kafka-data:
    driver: local
