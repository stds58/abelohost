services:
  loki:
    container_name: abelo-loki
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - abelo_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  loki-data:
    driver: local
