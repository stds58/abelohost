global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'statsd-exporter'
    static_configs:
      - targets: [ 'abelo-statsd-exporter:9102' ]

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['abelo-node-exporter:9100']

  - job_name: 'telegraf-docker'
    static_configs:
      - targets: [ 'abelo-telegraf:9273' ]
