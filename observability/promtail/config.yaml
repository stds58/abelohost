server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576 # 1MB
    timeout: 10s

scrape_configs:
  - job_name: docker
    # автоматическое обнаружение через сокет
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    # Добавляем парсинг содержимого логов
    pipeline_stages:
    # Говорим Promtail, что лог приходит в формате Docker (JSON обертка)
      - docker: { }

      # Парсим внутренний JSON от structlog. Мы извлекаем поля 'level' и 'request_id' из сообщения
      - json:
          expressions:
            level: level
            request_id: request_id
            event: event
            msg: message

      # Превращаем эти поля в лейблы Loki. Теперь в Grafana можно будет писать {level="error"}
      - labels:
          level:
          event:

      - static_labels:
          job: abelo-app

    relabel_configs:
      - source_labels: [ '__meta_docker_container_name' ]
        regex: '/abelo-app'
        action: keep

