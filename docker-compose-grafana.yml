x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  grafana:
    container_name: abelo-grafana
    image: grafana/grafana:10.4.0
    <<: *security-defaults
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER_FILE: /run/secrets/grafana_admin_user
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: "light"
      # Опционально: отключаем анонимный доступ и другие лишние функции
      #- GF_AUTH_ANONYMOUS_ENABLED=false
      #- GF_INSTALL_PLUGINS= # Пусто, если не нужны дополнительные плагины
    secrets:
      - grafana_admin_password
      - grafana_admin_user
    depends_on:
      - prometheus
      - loki
    networks:
      - abelo_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  grafana-data:
    driver: local

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  grafana_admin_user:
    file: ./secrets/grafana_admin_user.txt
