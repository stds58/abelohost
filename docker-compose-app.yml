x-app-vars: &abelo-app-vars
  DEBUG_MODE: ${DEBUG_MODE:-False}
  SECRET_KEY_FILE: "/run/secrets/secret_key"
  SESSION_MIDDLEWARE_SECRET_KEY_FILE: "/run/secrets/session_middleware_secret_key"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  GRANIAN_WORKERS: ${GRANIAN_WORKERS:-6}

x-db-vars: &abelo-db-vars
  POSTGRES_USER: ${DB_USER:-admin}
  POSTGRES_DB: ${DB_NAME:-abelo_db}
  POSTGRES_PASSWORD_FILE: "/run/secrets/db_password"

x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add: []
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
    - /run:size=32m,mode=755
  ulimits:
    nproc: 512
    nofile:
      soft: 4096
      hard: 8192

services:
  abelo-app:
    container_name: abelo-app
    build:
      context: .
      dockerfile: backend/Dockerfile
    <<: *security-defaults
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    ports:
      - "8000:8000"
    environment:
      <<: [*abelo-app-vars, *abelo-db-vars]
    env_file:
      - .env
    secrets:
      - db_password
      - secret_key
      - session_middleware_secret_key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      abelo-db:
        condition: service_healthy
      loki:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - abelo_network
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 12G
        reservations:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

volumes:
  app-cache:
    driver: local

secrets:
  db_password:
    file: ./secrets/db_password.txt
  secret_key:
    file: ./secrets/secret_key.txt
  session_middleware_secret_key:
    file: ./secrets/session_middleware_secret_key.txt
