x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add: []
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
    - /run:size=32m,mode=755
    - /tmp/alloy-data:size=32m,mode=0755
  ulimits:
    nproc: 512
    nofile:
      soft: 4096
      hard: 8192

services:
  alloy:
    container_name: abelo-alloy
    image: grafana/alloy:latest
    <<: *security-defaults
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "12345:12345"
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/tmp/alloy-data
    depends_on:
      kafka:
        condition: service_healthy
      loki:
        condition: service_started
    networks:
      - abelo_network
    restart: unless-stopped
